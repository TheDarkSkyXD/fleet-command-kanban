<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="chevron-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
  </defs>

  <!-- Shield / badge shape -->
  <path d="M256 32 L440 100 L440 260 C440 370 360 450 256 488 C152 450 72 370 72 260 L72 100 Z"
        fill="url(#shield-grad)" opacity="0.15" stroke="url(#shield-grad)" stroke-width="8"/>

  <!-- Inner shield outline -->
  <path d="M256 56 L420 116 L420 258 C420 356 348 430 256 464 C164 430 92 356 92 258 L92 116 Z"
        fill="none" stroke="url(#shield-grad)" stroke-width="3" opacity="0.4"/>

  <!-- Fleet chevrons (3 stacked, representing fleet formation) -->
  <!-- Top chevron (leader) -->
  <path d="M256 140 L320 200 L256 200 L192 200 Z"
        fill="url(#chevron-grad)" opacity="0.9"/>
  <path d="M256 140 L320 200" stroke="#F59E0B" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M256 140 L192 200" stroke="#F59E0B" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Middle chevron -->
  <path d="M256 210 L332 280" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>
  <path d="M256 210 L180 280" stroke="#60A5FA" stroke-width="6" stroke-linecap="round"/>

  <!-- Bottom chevron -->
  <path d="M256 280 L344 360" stroke="#60A5FA" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <path d="M256 280 L168 360" stroke="#60A5FA" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- Small dots representing fleet agents -->
  <circle cx="256" cy="130" r="8" fill="#F59E0B"/>
  <circle cx="192" cy="200" r="5" fill="#60A5FA" opacity="0.8"/>
  <circle cx="320" cy="200" r="5" fill="#60A5FA" opacity="0.8"/>
  <circle cx="168" cy="280" r="4" fill="#60A5FA" opacity="0.6"/>
  <circle cx="344" cy="280" r="4" fill="#60A5FA" opacity="0.6"/>
  <circle cx="148" cy="360" r="3" fill="#60A5FA" opacity="0.4"/>
  <circle cx="364" cy="360" r="3" fill="#60A5FA" opacity="0.4"/>

  <!-- Command star at center -->
  <path d="M256 220 L262 236 L280 236 L266 246 L270 262 L256 252 L242 262 L246 246 L232 236 L250 236 Z"
        fill="#F59E0B" opacity="0.9"/>
</svg>
